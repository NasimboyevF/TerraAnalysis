name: CI

# Запускается на каждый push и pull request в main —
# проверяет что и backend, и frontend вообще устанавливаются и собираются
# до того как Render/Netlify возьмутся деплоить.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node --check server.js
      # Полноценные тесты не подключены — этот шаг просто ловит синтаксические
      # и явные ошибки импорта до деплоя. Добавь `npm test`, когда появятся тесты.

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
